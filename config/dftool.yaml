# ══════════════════════════════════════════════════════════════════
# DFTool Configuration File
# Digital Forensics Monitoring Daemon — Detect & Log Only
# ══════════════════════════════════════════════════════════════════
# Copy this to /etc/dftool/dftool.yaml and adjust to your needs.
#
# Philosophy: This tool DETECTS and LOGS.  It does NOT prevent,
# block, or modify any system behaviour.  All data is preserved
# for post-incident forensic analysis and timeline reconstruction.
# ══════════════════════════════════════════════════════════════════

daemon:
  pid_file: /var/run/dftool/dftoold.pid
  user: root
  group: root

logging:
  log_dir: /var/log/dftool
  evidence_dir: /var/lib/dftool/evidence
  max_log_size_mb: 100          # rotate after this size
  log_rotation_count: 10        # keep N rotated files
  hash_algorithm: sha256        # integrity hash for each rotated log
  log_format: json              # json (machine-readable) or plain
  utc_timestamps: true          # forensic best-practice

# ──────────────────────────────────────────────
# Monitors — each runs in its own thread
# ──────────────────────────────────────────────
monitors:

  usb:
    enabled: true
    poll_interval: 1            # seconds
    alert_on_new_device: true
    whitelist: []               # known vendor:product pairs, e.g. ["8087:0024"]

  login:
    enabled: true
    watch_files:
      - /var/log/auth.log
      - /var/log/secure
      - /var/log/wtmp
      - /var/log/btmp
    alert_on_root_login: true
    alert_on_failed_login: true
    failed_login_threshold: 5   # N failures in window => brute-force alert
    failed_login_window_sec: 300

  network:
    enabled: true
    poll_interval: 5
    alert_on_new_listener: true
    alert_on_promiscuous: true  # NIC sniffing detection
    alert_on_new_interface: true
    monitored_ports: []         # empty = all
    baseline_listeners: []      # auto-populated on first run

  process:
    enabled: true
    poll_interval: 3
    alert_on_privilege_escalation: true
    suspicious_names:
      - nc
      - ncat
      - nmap
      - socat
      - tcpdump
      - wireshark
      - ettercap
      - hydra
      - john
      - hashcat
      - mimikatz
      - msfconsole
      - reverse_shell
      - bind_shell

  filesystem:
    enabled: true
    watch_paths:
      - /etc/passwd
      - /etc/shadow
      - /etc/sudoers
      - /etc/ssh/sshd_config
      - /etc/crontab
      - /etc/cron.d
      - /etc/systemd/system
      - /root/.ssh
      - /tmp
      - /var/tmp
    recursive: true
    alert_on_modify: true
    alert_on_create: true
    alert_on_delete: true

# ──────────────────────────────────────────────
# Alerts — how/where to send notifications
# ──────────────────────────────────────────────
alerts:
  alert_log: /var/log/dftool/alerts.log
  console: true
  syslog: true

  correlation:
    enabled: true
    model_name: FACES-v1
    window_sec: 300
    min_unique_monitors: 2
    min_score: 45
    emit_suppress_sec: 180
    score_weights:
      severity: 4.0
      diversity: 7.0
      burst: 20.0
      rarity: 25.0
      chain: 1.0
    chain_patterns:
      - name: credential_to_execution
        events: [LOGIN_FAILED, BRUTE_FORCE_DETECTED, SUSPICIOUS_PROCESS]
        bonus: 14
      - name: lateral_to_privilege
        events: [LOGIN_SUCCESS, UID_CHANGE, PRIVILEGE_ESCALATION]
        bonus: 16
      - name: network_recon_chain
        events: [NEW_INTERFACE, PROMISCUOUS_MODE, NEW_LISTENER]
        bonus: 12

  email:
    enabled: false
    smtp_server: ""
    smtp_port: 587
    from_addr: ""
    to_addr: ""
    username: ""
    password: ""

  webhook:
    enabled: false
    url: ""
