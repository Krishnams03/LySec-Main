# ================================================================
# LySec Configuration File
# Linux Forensics Monitoring Daemon - Detect & Log Only
# ================================================================
# Copy this to /etc/lysec/lysec.yaml and adjust to your needs.
#
# Philosophy: This tool DETECTS and LOGS. It does NOT prevent,
# block, or modify any system behavior. All data is preserved
# for post-incident forensic analysis and timeline reconstruction.
# ================================================================

daemon:
  pid_file: /var/run/lysec/lysecd.pid
  user: root
  group: root
  watchdog:
    enabled: true
    pid_file: /var/run/lysec/lysec-watchdog.pid
    heartbeat_socket: /var/run/lysec/lysec-heartbeat.sock
    heartbeat_interval_sec: 2
    heartbeat_timeout_sec: 8
    restart_cooldown_sec: 20
    service_name: lysec.service

logging:
  log_dir: /var/log/lysec
  evidence_dir: /var/lib/lysec/evidence
  max_log_size_mb: 100
  log_rotation_count: 10
  hash_algorithm: sha256
  log_format: json
  utc_timestamps: true

monitors:
  usb:
    enabled: true
    poll_interval: 1
    alert_on_new_device: true
    emit_startup_inventory: true
    startup_inventory_severity: INFO
    unknown_device_severity: MEDIUM
    storage_device_severity: MEDIUM
    hid_suspicious_keywords:
      - rubber
      - ducky
      - inject
      - badusb
      - keystroke
    severity_engine:
      weights:
        rule: 0.5
        heuristic: 0.3
        ml: 0.2
      score_thresholds:
        critical: 8.5
        high: 6.5
        medium: 4.5
        low: 2.5
      rapid_cycle_window_sec: 2.0
      rapid_cycle_min_events: 3
      ghost_mount_timeout_sec: 3.0
      off_hours_start: 22
      off_hours_end: 6
      power_draw_high_ma: 500
      generic_serial_patterns:
        - "123456"
        - "12345678"
        - "000000"
        - "abcdef"
        - "generic"
    emit_mount_event: true
    mount_enrich_timeout_sec: 15
    whitelist: []

  ports:
    enabled: true
    poll_interval: 1
    subsystems:
      - usb
      - thunderbolt
      - net
      - block
      - sound
      - drm
      - pci
    suppress_usb_if_usb_monitor_enabled: true
    alert_on_change: false
    drm_suspicious_keywords:
      - hid
      - keyboard
      - rubber
      - ducky
      - inject
    drm_allow_unknown_vendor: true

  login:
    enabled: true
    watch_files:
      - /var/log/auth.log
      - /var/log/secure
      - /var/log/wtmp
      - /var/log/btmp
    startup_backfill_enabled: true
    startup_backfill_lines: 300
    startup_backfill_records: 128
    alert_on_root_login: true
    alert_on_failed_login: true
    failed_login_threshold: 5
    failed_login_window_sec: 300

  network:
    enabled: true
    poll_interval: 5
    use_netlink: true
    alert_on_new_listener: true
    alert_on_promiscuous: true
    alert_on_new_interface: true
    alert_on_new_connection: true
    alert_on_default_route_change: true
    alert_on_arp_change: true
    monitored_ports: []
    baseline_listeners: []

  process:
    enabled: true
    poll_interval: 1
    event_source: auto  # auto|poll|proc_connector|ebpf
    use_proc_connector: true
    use_ebpf: false
    ebpf_strict: false
    alert_on_shortlived_exec: true
    alert_on_new_process: true
    alert_on_privilege_escalation: true
    alert_on_deleted_exe: true
    alert_on_masquerade: true
    alert_on_suspicious_tree: true
    management_parent_names:
      - nginx
      - apache2
      - httpd
      - php-fpm
      - uwsgi
      - gunicorn
    shell_child_names:
      - sh
      - bash
      - zsh
      - dash
      - ksh
    env_keys:
      - LD_PRELOAD
      - LD_LIBRARY_PATH
      - PYTHONPATH
      - PATH
      - HOME
      - USER
    fork_burst_window_sec: 1.0
    fork_burst_threshold: 120
    rare_process_window_sec: 1.0
    rare_process_threshold: 200
    alert_on_login_service_restarts: true
    login_service_restart_window_sec: 120.0
    login_service_restart_threshold: 3
    login_service_names:
      - gdm
      - gdm3
      - lightdm
      - sddm
      - xdm
      - ly
      - greetd
      - getty
      - agetty
      - login
    suspicious_names:
      - nc
      - ncat
      - nmap
      - socat
      - tcpdump
      - wireshark
      - ettercap
      - hydra
      - john
      - hashcat
      - mimikatz
      - msfconsole
      - reverse_shell
      - bind_shell

  filesystem:
    enabled: true
    watch_paths:
      - /etc/passwd
      - /etc/shadow
      - /etc/sudoers
      - /etc/ssh/sshd_config
      - /etc/crontab
      - /etc/cron.d
      - /etc/systemd/system
      - /root/.ssh
      - /tmp
      - /var/tmp
      - /media
      - /run/media
      - /mnt
    recursive: true
    watch_removable_media: true
      poll_interval: 1
    mount_watch_roots:
      - /media
      - /run/media
      - /mnt
      watch_user_gvfs: true
    enable_actor_attribution: true
    alert_on_modify: true
    alert_on_create: true
    alert_on_delete: true
    fuzzy_hashing:
      enabled: true
      algorithms:
        - ssdeep
        - tlsh

alerts:
  alert_log: /var/log/lysec/alerts.log
  console: true
  syslog: true
  integrity_chain:
    enabled: true
    seed: ""

  correlation:
    enabled: true
    model_name: FACES-v1
    window_sec: 300
    min_unique_monitors: 2
    min_score: 45
    emit_suppress_sec: 180
    score_weights:
      severity: 4.0
      diversity: 7.0
      burst: 20.0
      rarity: 25.0
      chain: 1.0
    chain_patterns:
      - name: credential_to_execution
        events: [LOGIN_FAILED, BRUTE_FORCE_DETECTED, SUSPICIOUS_PROCESS]
        bonus: 14
      - name: lateral_to_privilege
        events: [LOGIN_SUCCESS, UID_CHANGE, PRIVILEGE_ESCALATION]
        bonus: 16
      - name: network_recon_chain
        events: [NEW_INTERFACE, PROMISCUOUS_MODE, NEW_LISTENER]
        bonus: 12

  mitre:
    enabled: true
    default_confidence: 0.7
    overrides: {}

  ml_anomaly:
    enabled: true
    model_name: OnlineZ-v1
    window_sec: 300
    min_related_events: 3
    min_unique_monitors: 2
    min_score: 60.0
    emit_suppress_sec: 180
    warmup_samples: 20
    feature_history_limit: 1000
    feature_weights:
      corr_score: 2.4
      monitor_count: 1.8
      event_count: 1.6
      chain_count: 1.0
      rarity: 1.4

  email:
    enabled: false
    smtp_server: ""
    smtp_port: 587
    from_addr: ""
    to_addr: ""
    username: ""
    password: ""

  webhook:
    enabled: false
    url: ""

  fuzzy_alert_fingerprints:
    enabled: true
    algorithms: [ssdeep, tlsh]
    compare_previous: true
    cache_size: 2000

  severity_policy:
    usb_type_severity:
      MASS_STORAGE: MEDIUM
      HID: LOW
      HID_SUSPICIOUS: HIGH
      UNKNOWN: MEDIUM
      TRUSTED: INFO
    port_subsystem_severity:
      USB: MEDIUM
      THUNDERBOLT: CRITICAL
      THUNDERBOLT_NO_DMA_PROTECTION: CRITICAL
      THUNDERBOLT_WHILE_LOCKED: CRITICAL
      PCI: HIGH
      NET: HIGH
      BLOCK: MEDIUM
      DRM: LOW
      DRM_SUSPICIOUS: MEDIUM
      SOUND: LOW
    network_event_severity:
      NEW_INTERFACE: HIGH
      PROMISCUOUS_MODE: CRITICAL
      DEFAULT_ROUTE_CHANGED: HIGH
      DEFAULT_ROUTE_IMPOSTER: CRITICAL
      ARP_MAPPING_CHANGED: HIGH
